<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Panacota96 cyberpunk header</title>
  <desc id="desc">A dark cyberpunk-style header with a hexagonal DS logo, the Panacota96 wordmark, and a subtitle about cybersecurity engineering and education.</desc>
  <defs>
    <linearGradient id="bg" x1="60" y1="28" x2="1120" y2="292" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.55" stop-color="#0A1728"/>
      <stop offset="1" stop-color="#112944"/>
    </linearGradient>
    <radialGradient id="wash" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(944 92) rotate(133.152) scale(340 260)">
      <stop stop-color="#4ECFFF" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#4ECFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .ui {
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }
      .mono {
        font-family: Consolas, "Liberation Mono", Menlo, monospace;
      }
      .headline {
        fill: #F3F9FF;
        font-size: 54px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      .sub {
        fill: #A7C4E3;
        font-size: 20px;
        font-weight: 500;
      }
      .micro {
        fill: #88D6FF;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.1em;
      }
      .pill {
        fill: #E8F5FF;
        font-size: 14px;
        font-weight: 600;
      }
    </style>
  </defs>

  <rect x="8" y="8" width="1184" height="304" rx="24" fill="url(#bg)"/>
  <rect x="8.5" y="8.5" width="1183" height="303" rx="23.5" stroke="#2A4664"/>
  <rect x="8" y="8" width="1184" height="304" rx="24" fill="url(#wash)"/>

  <g opacity="0.11">
    <path d="M56 60H1144" stroke="#9ABBDD"/>
    <path d="M56 98H1144" stroke="#9ABBDD"/>
    <path d="M56 136H1144" stroke="#9ABBDD"/>
    <path d="M56 174H1144" stroke="#9ABBDD"/>
    <path d="M56 212H1144" stroke="#9ABBDD"/>
    <path d="M56 250H1144" stroke="#9ABBDD"/>
    <path d="M112 34V286" stroke="#9ABBDD"/>
    <path d="M210 34V286" stroke="#9ABBDD"/>
    <path d="M308 34V286" stroke="#9ABBDD"/>
    <path d="M406 34V286" stroke="#9ABBDD"/>
    <path d="M504 34V286" stroke="#9ABBDD"/>
    <path d="M602 34V286" stroke="#9ABBDD"/>
    <path d="M700 34V286" stroke="#9ABBDD"/>
    <path d="M798 34V286" stroke="#9ABBDD"/>
    <path d="M896 34V286" stroke="#9ABBDD"/>
    <path d="M994 34V286" stroke="#9ABBDD"/>
    <path d="M1092 34V286" stroke="#9ABBDD"/>
