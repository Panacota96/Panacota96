    <text x="22" y="156" class="mono" font-size="16" fill="#94DBFF">$ secure --teach --build</text>

    <circle cx="124" cy="52" r="76" fill="#2AA8FF" opacity="0.14" filter="url(#glow)"/>
    <path d="M124 2L175 31V92C175 128 153 161 124 178C95 161 73 128 73 92V31L124 2Z" fill="#0B1C2F" stroke="#75BCFF" stroke-width="2.5"/>
    <path d="M124 26L156 44V86C156 110 142 131 124 142C106 131 92 110 92 86V44L124 26Z" fill="#102640" stroke="#75BCFF" stroke-width="2.5"/>
