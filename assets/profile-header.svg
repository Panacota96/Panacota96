    <text x="22" y="20" class="mono micro">&gt; PANACOTA96</text>

    <g transform="translate(0 52)">
      <path d="M56 0L104.5 28V84C104.5 119 84.5 151.5 56 168C27.5 151.5 7.5 119 7.5 84V28L56 0Z" fill="#0D1B2C" stroke="#83DFFF" stroke-width="3" filter="url(#glow)"/>
      <path d="M56 22L85.5 39V76C85.5 98 73 118 56 128C39 118 26.5 98 26.5 76V39L56 22Z" fill="#112640" stroke="#83DFFF" stroke-width="2.5"/>
      <text x="29" y="89" class="ui" font-size="48" font-weight="700" fill="#F4FAFF">DS</text>
      <path d="M-4 74H18" stroke="#83DFFF" stroke-width="3" stroke-linecap="round"/>
      <path d="M-4 56V74" stroke="#83DFFF" stroke-width="3" stroke-linecap="round"/>
      <circle cx="20" cy="74" r="4" fill="#56E4CA"/>
      <path d="M93 102H114" stroke="#56E4CA" stroke-width="3" stroke-linecap="round"/>
      <path d="M114 83V102" stroke="#56E4CA" stroke-width="3" stroke-linecap="round"/>
      <circle cx="91" cy="102" r="4" fill="#83DFFF"/>
