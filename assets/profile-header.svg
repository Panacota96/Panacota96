  </g>

  <g transform="translate(272 82)">
    <text x="0" y="0" class="micro">DAVID SANTIAGO GONZALEZ RICO</text>
    <text x="0" y="62" class="ui headline">Panacota96</text>
    <text x="0" y="98" class="ui sub">Cybersecurity engineer focused on SecOps, labs, and practical security education.</text>

    <g transform="translate(0 136)">
      <rect x="0" y="0" width="128" height="34" rx="17" fill="#0B1C2F" stroke="#30577D"/>
